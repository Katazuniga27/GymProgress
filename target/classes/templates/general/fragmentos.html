<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title th:text="${titulo + ' | GymProgress'}">
        GymProgress
    </title>

    <link rel="stylesheet"
          th:href="@{/css/app.css}">
</head>

<body>

<aside th:fragment="sidebar(seccionActiva)"
       class="sidebar"
       id="sidebar">

    <div class="sidebar__brand">
        <span class="sidebar__logo">GP</span>
        <span>GymProgress</span>
    </div>

    <nav class="sidebar__nav">

        <a th:href="@{/}"
           th:classappend="${seccionActiva == 'inicio' ? 'active' : ''}">
            Dashboard
        </a>

        <a th:href="@{/rutinas/hoy}"
           th:classappend="${seccionActiva == 'rutina-hoy' ? 'active' : ''}">
            Rutina de hoy
        </a>

        <a th:href="@{/historial}"
           th:classappend="${seccionActiva == 'historial' ? 'active' : ''}">
            Historial
        </a>

        <a th:href="@{/ejercicios}"
           th:classappend="${seccionActiva == 'ejercicios' ? 'active' : ''}">
            Ejercicios
        </a>

        <a th:href="@{/rutinas}"
           th:classappend="${seccionActiva == 'rutinas' ? 'active' : ''}">
            Rutinas
        </a>

        <a th:href="@{/progreso}"
           th:classappend="${seccionActiva == 'progreso' ? 'active' : ''}">
            Progreso
        </a>

        <a th:href="@{/perfil}"
           th:classappend="${seccionActiva == 'perfil' ? 'active' : ''}">
            Perfil
        </a>

        <a th:href="@{/configuracion}"
           th:classappend="${seccionActiva == 'configuracion' ? 'active' : ''}">
            Configuración
        </a>

    </nav>

    <div class="sidebar__profile">

        <div class="sidebar__avatar">
            U
        </div>

        <div>
            <strong>Usuario</strong>
            <small>Ver perfil</small>
        </div>

    </div>

</aside>

<header th:fragment="mobileHeader"
        class="mobile-header">

    <button type="button"
            id="sidebarToggle"
            aria-label="Abrir menú">
        ☰
    </button>

    <strong>GymProgress</strong>

</header>

</body>
</html>
